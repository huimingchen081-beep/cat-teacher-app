workflows:
  ios-build:
    name: iOS 编译 & TestFlight
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - app_store
      ios_signing:
        provisioning_profiles:
          - profile: cat_teacher_profile
            certificate: cat_teacher_dist
    scripts:
      - name: 安装依赖
        script: flutter pub get
      - name: 编译 iOS IPA
        script: flutter build ipa --release --export-method app-store
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        submit_to_testflight: true
