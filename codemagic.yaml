workflows:
  ios-build:
    name: iOS 编译 & TestFlight
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: 16.0
      cocoapods: default
      groups:
        - app_store
    scripts:
      - name: 安装依赖
        script: flutter pub get
      - name: 初始化代码签名
        script: keychain initialize
      - name: 获取签名文件
        script: |
          app-store-connect fetch-signing-files "com.huiqin.cat_teacher" \
            --type IOS_APP_STORE \
            --create
      - name: 应用签名配置
        script: xcode-project use-profiles
      - name: 编译 iOS
        script: flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        submit_to_testflight: true
