workflows:
  ios-build:
    name: iOS 编译 & TestFlight
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - app_store
    scripts:
      - name: 安装 Flutter 依赖 + 生成 Podfile
        script: |
          set -e
          flutter pub get
          # 生成 Podfile（不实际编译，只生成 iOS 配置）
          cd ios
          pod init || true
          cd ..
          # 用 flutter 命令触发 Podfile 生成
          flutter build ios --release --no-codesign 2>&1 | head -50 || true
          # 确认 Podfile 存在
          ls -la ios/Podfile

      - name: 解码并安装代码签名证书和Profile
        script: |
          set -e
          echo "🔍 检查环境变量..."

          if [ -z "$CM_CERTIFICATE" ]; then
            echo "❌ CM_CERTIFICATE 环境变量为空！"
            exit 1
          fi

          if [ -z "$CM_PROVISIONING_PROFILE" ]; then
            echo "❌ CM_PROVISIONING_PROFILE 环境变量为空！"
            exit 1
          fi

          echo "📝 解码证书文件..."
          echo "$CM_CERTIFICATE" | base64 -d > /tmp/certificate.p12
          echo "📝 解码 Profile 文件..."
          echo "$CM_PROVISIONING_PROFILE" | base64 -d > /tmp/profile.mobileprovision

          echo "📋 文件大小检查:"
          ls -lh /tmp/certificate.p12 /tmp/profile.mobileprovision

          echo "🔑 创建钥匙串并导入证书..."
          security create-keychain -p "codemagic123" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "codemagic123" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          security import /tmp/certificate.p12 \
            -P "Chmchm811" \
            -A \
            -k build.keychain

          security set-key-partition-list -S apple-tool:,apple: -s -k "codemagic123" build.keychain

          echo "✅ 证书导入成功"

          echo "📋 安装 Provisioning Profile..."
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/com.huiqin.cat_teacher.mobileprovision
          echo "✅ Profile 安装成功"

          echo ""
          echo "🔍 验证钥匙串中的证书:"
          security find-identity -v -p codesigning build.keychain

          echo ""
          echo "🔍 验证安装的 Profile:"
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: pod install + 修改 Xcode 项目签名设置
        script: |
          set -e
          cd ios

          echo "📦 执行 pod install..."
          pod install

          echo "🔧 修改 Xcode 项目为手动签名..."
          python3 << 'PYEOF'
          import re

          pbxproj = 'Runner.xcodeproj/project.pbxproj'

          with open(pbxproj, 'r') as f:
              content = f.read()

          # 改为手动签名
          content = content.replace('CODE_SIGN_STYLE = Automatic;', 'CODE_SIGN_STYLE = Manual;')

          # 确保有 DEVELOPMENT_TEAM
          if 'DEVELOPMENT_TEAM = 4ZSSBDC2TM;' not in content:
              # 在第一个 CODE_SIGN_STYLE 后面加上团队 ID
              content = content.replace(
                  'CODE_SIGN_STYLE = Manual;\n',
                  'CODE_SIGN_STYLE = Manual;\n\t\t\tDEVELOPMENT_TEAM = 4ZSSBDC2TM;\n',
                  1
              )

          with open(pbxproj, 'w') as f:
              f.write(content)

          print("✅ Xcode 项目已改为手动签名")
          PYEOF

          cd ..

      - name: 编译 iOS IPA（xcodebuild 手动归档）
        script: |
          set -e

          echo "🔨 开始 xcodebuild 归档..."

          cd ios

          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/Runner.xcarchive \
            -destination generic/platform=iOS \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=4ZSSBDC2TM \
            PROVISIONING_PROFILE_SPECIFIER=com.huiqin.cat_teacher \
            clean archive

          echo "📦 导出 IPA..."
          mkdir -p ../build/ios/ipa

          xcodebuild -exportArchive \
            -archivePath build/Runner.xcarchive \
            -exportPath ../build/ios/ipa \
            -exportOptionsPlist ../ios/ExportOptions.plist

          echo "✅ IPA 生成成功:"
          ls -lh ../build/ios/ipa/

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
