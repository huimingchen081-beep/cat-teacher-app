workflows:
  ios-build:
    name: iOS 编译 & TestFlight
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: 16.0
      groups:
        - app_store
    scripts:
      - name: Flutter 依赖
        script: flutter pub get

      - name: 安装证书和 Profile
        script: |
          set -e
          echo "=== 解码证书 ==="
          echo "$CM_CERTIFICATE" | base64 -d > /tmp/cert.p12
          ls -l /tmp/cert.p12

          echo "=== 安装证书到 Keychain ==="
          security import /tmp/cert.p12 \
            -P "Chmchm811" \
            -A \
            -k ~/Library/Keychains/login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "Chmchm811" ~/Library/Keychains/login.keychain-db 2>/dev/null || true
          security find-identity -v -p codesigning ~/Library/Keychains/login.keychain-db

          echo "=== 解码并安装 Profile ==="
          echo "$CM_PROVISIONING_PROFILE" | base64 -d > /tmp/profile.mobileprovision
          ls -l /tmp/profile.mobileprovision

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          echo "✅ Profile 已安装到标准目录"

      - name: xcode-project 自动配置签名
        script: |
          set -e
          xcode-project use-profiles \
            --project ios/Runner.xcodeproj \
            --scheme Runner \
            --configuration Release

      - name: xcodebuild 归档
        script: |
          set -e
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/Runner.xcarchive \
            -destination "generic/platform=iOS" \
            clean archive
          echo "✅ 归档成功！"

      - name: 导出 IPA 并上传 TestFlight
        script: |
          set -e
          xcodebuild -exportArchive \
            -archivePath build/Runner.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ios/ExportOptions.plist
          ls -l build/ipa/

          echo "=== 上传 TestFlight ==="
          xcrun altool --upload-app -f build/ipa/*.ipa -t ios \
            --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" || echo "⚠️ 上传失败，请手动上传"

    artifacts:
      - build/ipa/*.ipa
