workflows:
  ios-build:
    name: iOS 编译 & TestFlight
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: 16.0
      cocoapods: default
      groups:
        - app_store
    scripts:
      - name: 安装依赖
        script: flutter pub get
      - name: 初始化密钥链并安装证书
        script: |
          keychain initialize
          keychain add-cert "$CM_CERTIFICATE_CAT_TEACHER_DIST"
      - name: 安装 Provisioning Profile
        script: |
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          cp "$CM_PROVISIONING_PROFILE_CAT_TEACHER_PROFILE" \
            "$PROFILES_DIR/$(uuidgen).mobileprovision"
      - name: 编译 iOS 并签名
        script: flutter build ipa --release --export-options-plist=/dev/null
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        submit_to_testflight: true
