workflows:
  ios-build:
    name: iOS 编译 & TestFlight
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - app_store
    scripts:
      - name: 安装依赖
        script: flutter pub get
      - name: 初始化密钥链
        script: keychain initialize
      - name: 安装证书到密钥链
        script: keychain add-certificates --certificate "$CM_CERTIFICATE_CAT_TEACHER_DIST"
      - name: 安装 Provisioning Profile
        script: |
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          cp "$CM_PROVISIONING_PROFILE_CAT_TEACHER_PROFILE" "$PROFILES_DIR/Cat_Teacher_App_Store.mobileprovision"
      - name: 编译 iOS IPA
        script: flutter build ipa --release --export-method app-store
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        submit_to_testflight: true
