workflows:
  ios-build:
    name: iOS 编译 & TestFlight
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store
    scripts:
      - name: flutter pub get
        script: |
          set -e
          flutter pub get

      - name: 解码并安装证书 + Profile
        script: |
          set -e

          echo "$CM_CERTIFICATE" | base64 -d > /tmp/certificate.p12
          echo "$CM_PROVISIONING_PROFILE" | base64 -d > /tmp/profile.mobileprovision

          echo "📋 文件大小:"
          ls -lh /tmp/certificate.p12 /tmp/profile.mobileprovision

          # 导入证书到登录钥匙串
          security import /tmp/certificate.p12 \
            -P "Chmchm811" \
            -A \
            -k ~/Library/Keychains/login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "Chmchm811" ~/Library/Keychains/login.keychain-db 2>/dev/null || true

          # 提取 Profile UUID 并安装
          PROFILE_UUID=$(security cms -D -i /tmp/profile.mobileprovision 2>/dev/null \
            | grep -A1 "<key>UUID</key>" | grep "<string>" \
            | sed -E 's/.*<string>(.*)<\/string>.*/\1/')
          echo "📋 Profile UUID: ${PROFILE_UUID}"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
          if [ -n "$PROFILE_UUID" ]; then
            cp /tmp/profile.mobileprovision \
              "$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision"
          else
            cp /tmp/profile.mobileprovision \
              "$HOME/Library/MobileDevice/Provisioning Profiles/cat_teacher.mobileprovision"
          fi

          echo "✅ 证书和 Profile 已安装"
          security find-identity -v -p codesigning ~/Library/Keychains/login.keychain-db
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/

          # 打印 Profile 里的 Team/Bundle 信息
          security cms -D -i /tmp/profile.mobileprovision 2>/dev/null \
            | grep -E "(UUID|Name|com\.huiqin|4ZSSBDC2TM|Entitlements)" \
            | head -20 || true

      - name: 修改项目签名设置 + 归档
        script: |
          set -e

          # 用 sed 把 Automatic 改成 Manual（不用 Python，避免 YAML 缩进冲突）
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' \
            ios/Runner.xcodeproj/project.pbxproj

          # 确保有 DEVELOPMENT_TEAM
          grep -q "DEVELOPMENT_TEAM = 4ZSSBDC2TM;" ios/Runner.xcodeproj/project.pbxproj || \
            sed -i '' 's/CODE_SIGN_STYLE = Manual;/CODE_SIGN_STYLE = Manual;\n\t\t\tDEVELOPMENT_TEAM = 4ZSSBDC2TM;/g' \
            ios/Runner.xcodeproj/project.pbxproj

          echo "🔍 签名设置验证:"
          grep -E "(CODE_SIGN_STYLE|DEVELOPMENT_TEAM)" ios/Runner.xcodeproj/project.pbxproj | head -10

          # 用 xcodebuild 直接归档（Flutter SPM 模式，无需 Podfile）
          echo "🔨 开始归档..."
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/Runner.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=4ZSSBDC2TM \
            clean archive 2>&1 | tail -200

          echo ""
          echo "📦 导出 IPA..."
          mkdir -p build/ios/ipa
          xcodebuild -exportArchive \
            -archivePath build/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios/ExportOptions.plist 2>&1 | tail -80

          echo "✅ IPA 生成成功:"
          ls -lh build/ios/ipa/

      - name: 手动上传 IPA 到 TestFlight
        script: |
          set -e
          
          echo "🚀 上传 IPA 到 TestFlight..."
          
          # 用 xcrun altool 上传（使用 App Store Connect API Key）
          IPA_PATH=$(ls build/ios/ipa/*.ipa 2>/dev/null | head -1)
          
          if [ -z "$IPA_PATH" ]; then
            echo "❌ 没有找到 IPA 文件!"
            ls -laR build/ios/ipa/ 2>/dev/null || true
            exit 1
          fi
          
          echo "📦 IPA 文件: $IPA_PATH"
          ls -lh "$IPA_PATH"
          
          # 方法1: 用 altool + API Key 上传
          echo "⬆️ 正在上传..."
          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            -t ios \
            --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            2>&1 || {
            
            # 方法2: 如果 altool 失败，尝试用 Transporter 方式
            echo "⚠️ altool 失败，尝试备用方式..."
            xcrun altool --upload-app \
              -f "$IPA_PATH" \
              -t ios \
              --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
              --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
              --verbose 2>&1 || true
          }
          
          echo "✅ TestFlight 上传完成"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
