workflows:
  ios-build:
    name: iOS 编译 & TestFlight
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store
    scripts:
      - name: Flutter 依赖
        script: flutter pub get

      - name: 安装证书和 Profile（临时 Keychain 方案）
        script: |
          set -e
          echo "=== 解码证书 ==="
          echo "$CM_CERTIFICATE" | base64 -d > /tmp/cert.p12
          ls -l /tmp/cert.p12

          echo "=== 创建临时 build.keychain ==="
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          echo "=== 导入证书到临时 Keychain ==="
          security import /tmp/cert.p12 \
            -P "Chmchm811" \
            -A \
            -t cert \
            -f pkcs12 \
            -k build.keychain
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "" \
            build.keychain

          echo "=== 验证证书 ==="
          security find-identity -v -p codesigning build.keychain

          echo "=== 解码并安装 Profile ==="
          echo "$CM_PROVISIONING_PROFILE" | base64 -d > /tmp/profile.mobileprovision
          ls -l /tmp/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/"Provisioning Profiles"
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/"Provisioning Profiles"/
          echo "✅ 证书和 Profile 安装完成"

      - name: 自动配置签名
        script: |
          set -e
          xcode-project use-profiles
          echo "✅ 签名配置完成"

      - name: 构建并导出 IPA
        script: |
          set -e
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner \
            --archive-flags "-configuration Release"
          echo "✅ IPA 构建完成！"
          ls -lh build/ios/ipa/

      - name: 上传 TestFlight（手动脚本，完整输出）
        script: |
          set -e
          echo "=== 写入 API Key ==="
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/api_key.p8
          echo "=== Key 文件前3行 ==="
          head -3 /tmp/api_key.p8

          echo ""
          echo "=== 开始上传 ==="
          app-store-connect publish \
            --path build/ios/ipa/cat_teacher.ipa \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key /tmp/api_key.p8
          
          echo ""
          echo "✅ TestFlight 上传完成！"

    artifacts:
      - "build/ios/ipa/*.ipa"
