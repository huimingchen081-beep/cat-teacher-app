name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number'
        required: false
        default: '1'

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Decode and import signing certificate
        run: |
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > signing-cert.p12
          security create-keychain -p temp build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p temp build.keychain
          security import signing-cert.p12 -k build.keychain -P "${{ secrets.P12_PASSWORD }}" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -k temp build.keychain
          security list-keychains -d user -s build.keychain login.keychain-db
          security find-identity -v -p codesigning

      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISION_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/cat_teacher.mobileprovision
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Set development team in Xcode project
        run: |
          python3 -c "
import re
with open('ios/Runner.xcodeproj/project.pbxproj', 'r') as f:
    content = f.read()
content = re.sub(r'(buildSettings = \{)', r'\1\n\t\t\t\tDEVELOPMENT_TEAM = 4ZSSBDC2TM;', content)
with open('ios/Runner.xcodeproj/project.pbxproj', 'w') as f:
    f.write(content)
print('DEVELOPMENT_TEAM added to all build configurations')
"

      - name: Get dependencies
        run: flutter pub get

      - name: Build IPA (Release)
        run: flutter build ipa --build-number=${{ github.event.inputs.build_number || '1' }} --export-options-plist=ios/ExportOptions.plist

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CatTeacher-iPA-${{ github.run_id }}
          path: |
            build/ios/ipa/*.ipa
          retention-days: 30

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain build.keychain || true
