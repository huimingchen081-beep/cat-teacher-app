name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number'
        required: false
        default: '1'

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Configure manual signing in Xcode project
        run: |
          # Add manual signing settings to all build configurations
          sed -i '' 's/buildSettings = {/buildSettings = {\n\t\t\t\tDEVELOPMENT_TEAM = 4ZSSBDC2TM;\n\t\t\t\tCODE_SIGN_STYLE = Manual;\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "Cat Teacher App Store";\n\t\t\t\tCODE_SIGN_IDENTITY = "Apple Distribution";/g' ios/Runner.xcodeproj/project.pbxproj
          grep -c "CODE_SIGN_STYLE" ios/Runner.xcodeproj/project.pbxproj
          grep "PROVISIONING_PROFILE_SPECIFIER" ios/Runner.xcodeproj/project.pbxproj

      - name: Decode and import signing certificate
        run: |
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > signing-cert.p12
          security create-keychain -p temp build.keychain
          security unlock-keychain -p temp build.keychain
          security import signing-cert.p12 -k build.keychain -P "${{ secrets.P12_PASSWORD }}" -A -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k temp build.keychain
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | tr -d '"' | tr -d ' ')
          security default-keychain -s build.keychain
          security find-identity -v -p codesigning

      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISION_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/cat_teacher.mobileprovision
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Get dependencies
        run: flutter pub get

      - name: Build IPA (Release)
        run: flutter build ipa --build-number=${{ github.event.inputs.build_number || '1' }} --export-options-plist=ios/ExportOptions.plist

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CatTeacher-iPA-${{ github.run_id }}
          path: |
            build/ios/ipa/*.ipa
          retention-days: 30

      - name: Setup App Store Connect API Key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APPSTORE_API_KEY_BASE64 }}" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8
          echo "API key installed: AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8"

      - name: Upload to App Store Connect
        run: |
          xcrun altool --upload-app \
            -f build/ios/ipa/*.ipa \
            -t ios \
            --apiKey "${{ secrets.APPSTORE_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPSTORE_ISSUER_ID }}" \
            --verbose

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain build.keychain || true
