name: cat_teacher
description: "猫咪老师 - AI全学科学习助手App"
publish_to: 'none'
version: 1.0.1+3

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  http: ^1.2.2
  shared_preferences: ^2.3.3
  audioplayers: ^6.1.0
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  file_picker: ^8.1.4
  record: ^7.1.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/cats/primary_cat.png
    - assets/cats/junior_cat.png
    - assets/cats/senior_cat.png
